---
include:
  - docassemble.AssemblyLine:assembly_line.yml
  - docassemble.ALMassachusetts:al_massachusetts.yml
---
code: |
  AL_DEFAULT_COUNTRY = "US"
---
code: |
  AL_DEFAULT_STATE = "MA"
---
objects:
  - users: ALPeopleList.using(ask_number=False, target_number=2)
  - attorneys: ALPeopleList.using(ask_number=False)
---
code: |
  addresses_to_search = []
---
#################### Interview order #####################
comment: |
  Controls order and branching logic for questions specific to this form.
  Can be run on its own (see main_motion_to_amend.yml) or included by another
  interview (e.g. docassemble-MATC1ADivorceJointPetition) as the conditional
  first step when the parties already have an existing 1B case.

  Note: docassemble can't resolve a question's field target through a
  computed list index (e.g. users[plaintiff_index]) -- it only matches
  literal indices. So users[0]/users[1]/attorneys[0]/attorneys[1] are used
  as the literal field targets throughout, and plaintiff_index/defendant_index
  (0 or 1) are only ever used in plain code, in question *text*, and in the
  docx template -- never as a field target.
id: interview_order_motion_to_amend
code: |
  allowed_courts = ['Probate and Family Court']
  user_role = "plaintiff"
  user_ask_role = "plaintiff"

  # "section_parties" etc. only exist in main_motion_to_amend.yml's own nav
  # (standalone use). When this file is included by another interview
  # (e.g. the Joint Petition), has_existing_1b_action is defined and that
  # interview manages its own nav sections instead.
  if not defined("has_existing_1b_action"):
    nav.set_section("section_parties")
  users[0].name.first
  users[1].name.first

  if defined("has_existing_1b_action") and not plaintiff_is_party_a:
    users.elements[0], users.elements[1] = users.elements[1], users.elements[0]
    plaintiff_index = 1
  else:
    plaintiff_index = 0
  defendant_index = 1 - plaintiff_index

  if not defined("has_existing_1b_action"):
    nav.set_section("section_case")
  trial_court.division
  docket_number
  set_progress(30)
  marriage_breakdown_date
  breakdown_location
  action_commenced_date
  set_progress(50)

  if not defined("has_existing_1b_action"):
    nav.set_section("section_signing")
  users[0].has_attorney
  if users[0].has_attorney:
    attorneys[0].name_fields()
    attorneys[0].address_fields()
    attorneys[0].phone_number
    attorneys[0].bbo_number
  else:
    users[0].address.address
    users[0].phone_number

  set_progress(70)
  users[1].has_attorney
  if users[1].has_attorney:
    attorneys[1].name_fields()
    attorneys[1].address_fields()
    attorneys[1].phone_number
    attorneys[1].bbo_number
  else:
    users[1].address.address
    users[1].phone_number

  set_progress(90)
  # The plaintiff's attorney (if repped) never e-signs here -- only the
  # plaintiff themselves, if pro se. The defendant's side always provides
  # some signature: the defendant if pro se, otherwise their attorney.
  if plaintiff_index == 0:
    if not users[0].has_attorney:
      users[0].signature
    if not users[1].has_attorney:
      users[1].signature
    else:
      attorneys[1].signature
  else:
    if not users[1].has_attorney:
      users[1].signature
    if not users[0].has_attorney:
      users[0].signature
    else:
      attorneys[0].signature

  interview_order_motion_to_amend = True
---
id: plaintiff name
question: |
  What is the **plaintiff's** name?
subquestion: |
  Enter the name of the person who filed the original 1B divorce complaint.
fields:
  - First name: users[0].name.first
  - Middle name: users[0].name.middle
    required: False
  - Last name: users[0].name.last
---
id: defendant name
question: |
  What is the **defendant's** name?
subquestion: |
  Enter the name of the other spouse in this case.
fields:
  - First name: users[1].name.first
  - Middle name: users[1].name.middle
    required: False
  - Last name: users[1].name.last
---
id: plaintiff party letter
question: |
  Who do you want listed first in your joint petition?
subquestion: |
  You're about to prepare a joint petition alongside this motion. That
  petition lists one spouse as "Party A" (listed first) and the other as
  "Party B."

  This has no legal effect on the motion itself — it only controls the
  order the two of you appear in on the joint petition.
fields:
  - "Who do you want listed as Party A?": plaintiff_is_party_a
    datatype: radio
    choices:
      - "${ users[0] } (the plaintiff on the 1B case)": True
      - "${ users[1] } (the defendant on the 1B case)": False
---
id: case information
question: |
  Case information
subquestion: |
  Enter the docket number from your original 1B divorce complaint exactly
  as it appears on your court paperwork.
fields:
  - "Docket number": docket_number
    hint: e.g., BR-2024-D-0123
---
id: breakdown details
question: |
  When and where did the marriage irretrievably break down?
subquestion: |
  Paragraph 5 of the amended complaint will state when and where the
  irretrievable breakdown of the marriage occurred.
fields:
  - "Date of irretrievable breakdown": marriage_breakdown_date
    datatype: date
  - "City or town where the breakdown occurred": breakdown_location
    hint: e.g., Fall River, Massachusetts
---
id: action commenced date
question: |
  When was the original 1B complaint filed?
subquestion: |
  The motion asks the court to allow filing of the Separation Agreement
  and Affidavits of Irretrievable Breakdown after 90 days from when
  this action was commenced.

  Enter the date the original 1B complaint was filed with the court.
fields:
  - "Date the original 1B action was commenced": action_commenced_date
    datatype: date
---
id: attorney status for first party
question: |
  Is ${ users[0] } represented by an attorney?
subquestion: |
  % if plaintiff_index == 0:
  ${ users[0] } is the **plaintiff** on the original 1B case.
  % else:
  ${ users[0] } is the **defendant** on the original 1B case.
  % endif
fields:
  - "Does ${ users[0] } have an attorney for this case?": users[0].has_attorney
    datatype: yesnoradio
---
id: attorney information for first party
sets:
  attorneys[0].name.first
  attorneys[0].address.address
  attorneys[0].phone_number
  attorneys[0].bbo_number
question: |
  Attorney for ${ users[0] }
subquestion: |
  Enter the contact information for ${ users[0] }'s attorney. This will
  appear on the signature block of the motion.
fields:
  - code: |
      attorneys[0].name_fields()
  - code: |
      attorneys[0].address_fields()
  - "Attorney phone number": attorneys[0].phone_number
    datatype: tel
  - "Board of Bar Overseers (BBO) Number": attorneys[0].bbo_number
---
id: pro se contact for first party
question: |
  Contact information for ${ users[0] }
subquestion: |
  Since ${ users[0] } is self-represented, their name, address, and phone
  number will appear on the motion.
fields:
  - Street address: users[0].address.address
  - Unit/Apt: users[0].address.unit
    required: False
  - City: users[0].address.city
  - State: users[0].address.state
    code: states_list()
    default: MA
  - Zip code: users[0].address.zip
  - Phone number: users[0].phone_number
    hint: e.g., (508) 555-0100
---
id: attorney status for second party
question: |
  Is ${ users[1] } represented by an attorney?
subquestion: |
  % if plaintiff_index == 1:
  ${ users[1] } is the **plaintiff** on the original 1B case.
  % else:
  ${ users[1] } is the **defendant** on the original 1B case.
  % endif
fields:
  - "Does ${ users[1] } have an attorney for this case?": users[1].has_attorney
    datatype: yesnoradio
---
id: attorney information for second party
sets:
  attorneys[1].name.first
  attorneys[1].address.address
  attorneys[1].phone_number
  attorneys[1].bbo_number
question: |
  Attorney for ${ users[1] }
subquestion: |
  Enter the contact information for ${ users[1] }'s attorney. This will
  appear on the signature block of the motion.
fields:
  - code: |
      attorneys[1].name_fields()
  - code: |
      attorneys[1].address_fields()
  - "Attorney phone number": attorneys[1].phone_number
    datatype: tel
  - "Board of Bar Overseers (BBO) Number": attorneys[1].bbo_number
---
id: pro se contact for second party
question: |
  Contact information for ${ users[1] }
subquestion: |
  Since ${ users[1] } is self-represented, their name, address, and phone
  number will appear on the motion.
fields:
  - Street address: users[1].address.address
  - Unit/Apt: users[1].address.unit
    required: False
  - City: users[1].address.city
  - State: users[1].address.state
    code: states_list()
    default: MA
  - Zip code: users[1].address.zip
  - Phone number: users[1].phone_number
    hint: e.g., (508) 555-0200
---
id: assenting attorney signature for index 1
question: |
  Signature of ${ attorneys[1] }
subquestion: |
  ${ attorneys[1] }, please sign below to confirm that the defendant agrees
  to convert this case to a 1A joint petition.
fields:
  - Sign your name: attorneys[1].signature
    datatype: signature
---
id: assenting attorney signature for index 0
question: |
  Signature of ${ attorneys[0] }
subquestion: |
  ${ attorneys[0] }, please sign below to confirm that the defendant agrees
  to convert this case to a 1A joint petition.
fields:
  - Sign your name: attorneys[0].signature
    datatype: signature
---
# ALDocument objects
objects:
  - motion_to_amend_attachment: ALDocument.using(title="Motion to Amend 1B Divorce Complaint to 1A Joint Petition", filename="motion_to_amend_1b_to_1a", enabled=True, has_addendum=False)
---
attachment:
  name: Motion to Amend 1B Divorce Complaint to 1A Joint Petition
  filename: motion_to_amend_1b_to_1a
  variable name: motion_to_amend_attachment[i]
  skip undefined: True
  docx template file: motion_to_amend.docx
  tagged pdf: True
