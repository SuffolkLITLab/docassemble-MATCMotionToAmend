metadata:
  title: >-
    Convert Your 1B Divorce to a 1A Joint Petition
  short title: >-
    Motion to Amend to 1A
  description: |
    Use this interview to ask the Probate and Family Court to convert your
    contested 1B divorce into a joint 1A no-fault divorce under
    M.G.L. c. 208, § 1A.

    It will help you complete a **Motion to Amend 1B Divorce Complaint to
    1A Joint Petition** and prepare it for filing.
  can_I_use_this_form: |
    You can use this interview if:

    * You are the **plaintiff** in a pending 1B divorce case in a
      Massachusetts Probate and Family Court, **and**
    * **Both** you and your spouse now agree to convert the case to a joint
      1A petition.
  before_you_start: |
    Before you get started, please gather:

    1. The **docket number** from your original 1B divorce complaint
    1. The **date and city or town** where the irretrievable breakdown of
       your marriage occurred
    1. The **date your original 1B complaint was filed** with the court
    1. Contact information for whoever will sign for the plaintiff
       (you or your attorney)
    1. Contact information for whoever will sign for the defendant
       (the defendant or their attorney)

    When you are finished, you will need to:

    1. Print the motion
    1. The plaintiff's side signs the top signature block
    1. The defendant's side signs the "Assented To" block
    1. File the completed motion with your Probate and Family Court
